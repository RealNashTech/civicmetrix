name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: civicmetrics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d civicmetrics_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/civicmetrics_test?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/civicmetrics_shadow?schema=public
      NEXTAUTH_SECRET: test-secret
      AUTH_SECRET: test-secret
      REDIS_URL: redis://localhost:6379
      UPSTASH_REDIS_REST_URL: https://example.upstash.io
      UPSTASH_REDIS_REST_TOKEN: test-token
      NEXTAUTH_URL: http://127.0.0.1:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Prisma migrate status
        run: npx prisma migrate status

      - name: Check Prisma migrations
        run: npm run check:migrations

      - name: Schema drift detection
        run: npx prisma migrate diff --from-migrations prisma/migrations --to-schema prisma/schema.prisma --shadow-database-url "$SHADOW_DATABASE_URL" --exit-code

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit -- --reporter=json --outputFile /tmp/vitest-unit.json

      - name: Unit test coverage gate
        run: |
          node -e 'const fs=require("fs"); const report=JSON.parse(fs.readFileSync("/tmp/vitest-unit.json","utf8")); const tests=report.numTotalTests ?? 0; if(tests < 55){ console.error(`Unit test coverage gate failed: expected >=55 tests, got ${tests}`); process.exit(1);} console.log(`Unit test coverage gate passed: ${tests} tests`);'

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Start app for E2E
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 &
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:3000/api/system/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "app did not start in time"
          exit 1

      - name: E2E tests (merge blocker)
        run: npm run test:e2e
