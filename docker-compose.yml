services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: civicmetrix-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: civicmetrics
    ports:
      - "5433:5432"
    volumes:
      - civicmetrix_pgdata:/var/lib/postgresql/data

volumes:
  civicmetrix_pgdata: